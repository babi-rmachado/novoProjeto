<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo Const</title>
</head>
<body>
    <h1>Exemplo com Const</h1>
    <p>O nome do sistema é fixo (const)</p>

    <label for="">Digite seu nome: </label>
    <input type="text" id="nome">

    <button onclick="mostrar()">Mostrar</button>

    <p id="resultado"></p>

    <script>
        const sistema = "Sistema Escolar";//Constante que não altera

        //Função botão
        function mostrar(){
            //Valor digitado pode mudar
            let nome = document.getElementById("nome").value
            //Mostrando na tela
            document.getElementById("resultado").innerHTML = "Bem-vindo(a), " +nome+ ", ao " +sistema;

        }
    </script>

</body>
</html>
