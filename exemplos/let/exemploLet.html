<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo Let</title>
</head>
<body>
    <h1>Exemplo Let no document usando a multiplicação</h1>

    <label for="">Digite um número para multiplicar por 2: </label>
    <input type="text" name="" id="numero">

    <button onclick="mult()">Multiplicar</button>

    <p id="resultado"></p>

    <script>
        function mult(){
            let numero = document.getElementById("numero").value;
            numero = numero*2;
            document.getElementById("resultado").innerHTML = "O resultado da multiplicação é: "+numero;
        }
    </script>
</body>
</html>
