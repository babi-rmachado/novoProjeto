<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo Var + Alert</title>
</head>
<body>
    <h1>Exemplo Var + Alert</h1><!--Título-->
    <script>//JavaScript Inline
        var idade = window.prompt("Digite sua idade: ");//Window.prompt serve para interagir com o usuário
        window.alert("Idade digitada é: "+idade);//Mostrar o resultado no console, aperte ctrl+j para ver
    </script>
</body>
</html>
